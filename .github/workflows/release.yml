name: Build and Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  create-version:
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.compute.outputs.version }}
      tag: ${{ steps.compute.outputs.tag }}

    steps:
      - name: Compute custom version
        id: compute
        shell: bash
        run: |
          VERSION=$(node -e "
            const now = new Date();
            const y = now.getUTCFullYear() - 2026;
            const mm = now.getUTCMonth() + 1;
            const dd = now.getUTCDate();
            const hh = String(now.getUTCHours()).padStart(2,'0');
            console.log(`${y}.${mm}.${dd}${hh}`);
          ")

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

  build:
    needs: create-version

    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Update package version
        run: npm version ${{ needs.create-version.outputs.version }} --no-git-tag-version

      - name: Build Electron Application
        run: npm run electron:build -- --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Useful for debugging CI failures
      - name: List release files (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Get-ChildItem release -Recurse

      - name: List release files (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          ls -R release

      # Upload Windows artifacts
      - name: Upload Windows artifacts
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: |
            release/*.exe
            release/*.blockmap
            release/latest.yml
          if-no-files-found: error

      # Upload macOS artifacts
      - name: Upload macOS artifacts
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: mac-release
          path: |
            release/*.dmg
            release/latest-mac.yml
          if-no-files-found: error

  release:
    needs:
      - create-version
      - build

    runs-on: ubuntu-latest

    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: artifacts/windows

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: mac-release
          path: artifacts/mac

      - name: Display downloaded artifacts
        run: |
          find artifacts -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-version.outputs.tag }}
          name: ${{ needs.create-version.outputs.tag }}
          fail_on_unmatched_files: true
          files: |
            artifacts/windows/*
            artifacts/mac/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}