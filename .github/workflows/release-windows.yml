name: Build and Release (Windows)

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compute datetime version (UTC)
        shell: pwsh
        run: |
          $dt = [DateTime]::UtcNow.ToString("yyyyMMdd'T'HHmmssfff'Z'")
          $version = "0.0.0-$dt"
          "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "TAG=v$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Update package.json version (no commit)
        run: npm version ${{ env.VERSION }} --no-git-tag-version

      - name: Build Windows installer (.exe)
        run: npm run electron:build -- --publish never

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ env.TAG }}
          name: ${{ env.TAG }}
          fail_on_unmatched_files: true
          files: |
            release/*.exe
            release/*.blockmap
